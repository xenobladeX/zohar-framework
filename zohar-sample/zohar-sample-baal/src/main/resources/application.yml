
spring:
  flyway:
    clean-disabled: true
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    encoding: utf-8
    table: zohar_schema_history
    out-of-order: true
    schemas: zohar_demo


