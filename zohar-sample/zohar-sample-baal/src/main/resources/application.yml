      #        break-after-acquire-failure:
      #        filters: stat,wall # 注意这个值和druid原生不一致，默认启动了stat,wall
      druid:
        filters: stat
        initialSize: 2
        maxActive: 300
        maxWait: 60000
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: SELECT 1
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        poolPreparedStatements: false
        maxPoolPreparedStatementPerConnectionSiz: 200
      datasource:
        master:
          username: sa
          password:
          url: jdbc:h2:mem:test;INIT=CREATE SCHEMA IF NOT EXISTS zohar_demo
          driver-class-name: org.h2.Driver
          druid: #这里可以重写默认值
            initial-size: 5
            init-connection-sqls: SET SCHEMA zohar_demo

