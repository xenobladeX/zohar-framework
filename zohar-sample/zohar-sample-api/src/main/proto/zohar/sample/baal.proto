syntax = "proto3";

package zohar.sample;

import "zohar/sample/enum.proto";

option java_multiple_files = false;
option java_generic_services = true;
option java_package = "com.xenoblade.zohar.sample.baal.api";
option java_outer_classname = "Baal";


message HelloBaalRequest {

}

message HelloBaalResponse {
    string response = 1;
    int32 errorcode = 2;
}


service BaalService {

    rpc HelloBaal (HelloBaalRequest) returns (HelloBaalResponse) {};

}
