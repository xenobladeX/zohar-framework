spring:
  application:
    name: &appName zohar-cache-aspectj-test

  # redis 配置
  redis:
    # Redis数据库索引（默认为0）
    database: 0
    # Redis服务器地址
    host: localhost
    # Redis服务器连接端口
    port: 6379
    # Redis服务器连接密码（默认为空）
#    password:
    # 连接超时时间（毫秒）
#    timeout:


logging:
  level:
    com.xenoblade.zohar.framework.cache: debug

